name: Post Wisdom to Instagram

on:
  schedule:
    - cron: "30 1,7,13,19 * * *"   # 1:30, 7:30, 13:30, 19:30 UTC (4× daily)
  workflow_dispatch:                  # allow manual runs from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r instagram/requirements.txt

      - name: Install fonts
        run: sudo apt-get install -y fonts-liberation

      - name: Run daily post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python instagram/daily_post.py

      - name: Commit updated used_quotes.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram/used_quotes.json
          git diff --cached --quiet || git commit -m "chore: update used quotes log [skip ci]"
          git push
